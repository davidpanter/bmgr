# bmgr tmux integration
#
# Add these lines to your ~/.tmux.conf to browse keybindings from tmux.

# Browse all bindings in a popup (prefix + k)
bind k display-popup -E -w 90% -h 80% -T " Keybindings " "bmgr"

# Browse bindings filtered to tmux only (prefix + K)
bind K display-popup -E -w 90% -h 80% -T " Keybindings " "bmgr --app tmux"
